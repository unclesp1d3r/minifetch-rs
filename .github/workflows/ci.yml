name: CI

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]
    workflow_dispatch:

defaults:
    run:
        shell: bash

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

env:
    CARGO_TERM_COLOR: always
    CI: "true"
    GITHUB_ACTIONS: "true"

jobs:
    quality:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
            - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
              with:
                  install: true
                  cache: true
                  github_token: ${{ secrets.GITHUB_TOKEN }}
            - name: Ensure rustfmt and clippy are installed
              run: rustup component add rustfmt clippy
            - name: Format check
              run: just fmt-check
            - name: Clippy
              run: just clippy

    test:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
            - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
              with:
                  install: true
                  cache: true
                  github_token: ${{ secrets.GITHUB_TOKEN }}
            - name: Run tests
              run: just test-ci
            - name: Build release
              run: just build-release

    test-cross-platform:
        strategy:
            fail-fast: false
            matrix:
                os:
                    - ubuntu-latest
                    - macos-latest
                    - windows-latest
        runs-on: ${{ matrix.os }}
        needs: test
        steps:
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
            - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
              with:
                  install: true
                  cache: true
                  github_token: ${{ secrets.GITHUB_TOKEN }}
            - name: Run tests
              run: just test-ci
            - name: Build release
              run: just build-release

    coverage:
        runs-on: ubuntu-latest
        needs: test
        steps:
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
            - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
              with:
                  install: true
                  cache: true
                  github_token: ${{ secrets.GITHUB_TOKEN }}
            - name: Generate coverage
              run: just coverage
            - name: Upload to Codecov
              uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6.0.0
              with:
                  files: lcov.info
                  fail_ci_if_error: false
                  token: ${{ secrets.CODECOV_TOKEN }}
